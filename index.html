<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tuana Anakaygısız - Veri Analizi ve Python Portfolyosu">
    <title>Tuana Anakaygısız | Portfolyo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=MedievalSharp&family=Uncial+Antiqua&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        /* ── Reset ── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ── Body / Deep Parchment ── */
        body {
            font-family: 'Special Elite', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1408;
            background-image:
                radial-gradient(ellipse at 10% 20%, rgba(100, 75, 40, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(70, 50, 25, 0.45) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 50%, rgba(120, 90, 50, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 75% 15%, rgba(90, 65, 30, 0.25) 0%, transparent 40%),
                radial-gradient(ellipse at 25% 85%, rgba(80, 55, 25, 0.2) 0%, transparent 45%);
            color: #3d2e1a;
            position: relative;
        }

        /* Layered fibre / grain texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.025) 2px, rgba(0, 0, 0, 0.025) 3px),
                repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(0, 0, 0, 0.015) 3px, rgba(0, 0, 0, 0.015) 4px),
                repeating-linear-gradient(45deg, transparent, transparent 6px, rgba(50, 35, 10, 0.01) 6px, rgba(50, 35, 10, 0.01) 7px),
                repeating-linear-gradient(135deg, transparent, transparent 9px, rgba(60, 40, 15, 0.008) 9px, rgba(60, 40, 15, 0.008) 10px);
            pointer-events: none;
            z-index: 0;
        }

        /* Speckle noise layer */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 40%, rgba(40, 25, 10, 0.06) 1px, transparent 1px),
                radial-gradient(circle at 60% 15%, rgba(40, 25, 10, 0.04) 1px, transparent 1px),
                radial-gradient(circle at 80% 60%, rgba(40, 25, 10, 0.05) 1px, transparent 1px),
                radial-gradient(circle at 35% 75%, rgba(40, 25, 10, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 55% 90%, rgba(40, 25, 10, 0.04) 1px, transparent 1px);
            background-size: 13px 13px, 17px 17px, 11px 11px, 19px 19px, 15px 15px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Parchment Page ── */
        .page {
            position: relative;
            z-index: 1;
            max-width: 820px;
            width: 100%;
            margin: 2rem;
            padding: 3rem 2.5rem;
            background:
                radial-gradient(ellipse at 25% 15%, rgba(170, 130, 70, 0.18) 0%, transparent 45%),
                radial-gradient(ellipse at 75% 85%, rgba(150, 115, 55, 0.14) 0%, transparent 40%),
                radial-gradient(circle at 8% 92%, rgba(110, 80, 35, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 92% 8%, rgba(100, 70, 30, 0.08) 0%, transparent 30%),
                linear-gradient(145deg, #c0a460, #d4b97a 18%, #b89855 40%, #d1b474 62%, #c4a562 82%, #ba9a55);
            border-radius: 3px;
            box-shadow:
                0 0 0 3px #6b4f2a,
                0 0 0 7px #3d2e1a,
                0 0 0 8px #8b6d3a,
                0 14px 45px rgba(0, 0, 0, 0.7),
                inset 0 0 90px rgba(80, 55, 20, 0.22),
                inset 0 0 20px rgba(60, 40, 15, 0.08);
            border: 1px solid #a0814a;
        }

        /* Aged stain marks */
        .page::before {
            content: '';
            position: absolute;
            top: 6%;
            left: -2%;
            width: 160px;
            height: 160px;
            background: radial-gradient(circle,
                rgba(100, 70, 30, 0.1) 0%,
                rgba(90, 60, 25, 0.05) 45%,
                transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .page::after {
            content: '';
            position: absolute;
            bottom: 8%;
            right: 2%;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle,
                rgba(85, 60, 25, 0.09) 0%,
                rgba(70, 50, 20, 0.04) 40%,
                transparent 65%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* ── Inner Decorative Border ── */
        .inner-border {
            border: 1px solid rgba(100, 70, 30, 0.35);
            border-radius: 3px;
            padding: 2.5rem 2rem;
            position: relative;
            box-shadow: inset 0 0 15px rgba(80, 55, 20, 0.06);
        }

        .inner-border::before {
            content: '✦ ⚡ ✦';
            position: absolute;
            top: -0.65rem;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #c9a868, #d1b474, #c9a868);
            padding: 0 1.2rem;
            font-size: 0.75rem;
            color: #6b4f2a;
            letter-spacing: 0.4rem;
        }

        .inner-border::after {
            content: '✦ ⚡ ✦';
            position: absolute;
            bottom: -0.65rem;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #c9a868, #d1b474, #c9a868);
            padding: 0 1.2rem;
            font-size: 0.75rem;
            color: #6b4f2a;
            letter-spacing: 0.4rem;
        }

        /* ── Oath Header ── */
        .oath {
            font-family: 'Dancing Script', cursive;
            text-align: center;
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.6;
            color: #5a4028;
            margin-bottom: 2.2rem;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid rgba(100, 70, 30, 0.2);
            letter-spacing: 0.03em;
            font-style: italic;
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.04);
        }

        /* ── Profile Section ── */
        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.7rem;
            margin-bottom: 2.5rem;
        }

        .photo-frame {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(135deg, #7a4e28, #c9944a 30%, #5a361e 50%, #a07840 75%, #7a4e28);
            box-shadow:
                0 0 0 2px #3d2e1a,
                0 0 0 4px rgba(139, 109, 58, 0.5),
                0 6px 20px rgba(0, 0, 0, 0.35),
                inset 0 0 10px rgba(0, 0, 0, 0.25);
        }

        .profile-photo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #5a3d1e;
        }

        .profile-name {
            font-family: 'MedievalSharp', cursive;
            font-size: 1.6rem;
            color: #3d2e1a;
            letter-spacing: 0.04em;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.06);
        }

        .profile-subtitle {
            font-family: 'Special Elite', monospace;
            font-size: 0.82rem;
            color: #6b5534;
            letter-spacing: 0.03em;
        }

        /* ── Separator ── */
        .separator {
            text-align: center;
            font-size: 0.7rem;
            color: #8b6d3a;
            letter-spacing: 0.5rem;
            margin-bottom: 2rem;
        }

        /* ── Button Cards ── */
        .cards {
            display: flex;
            gap: 1rem;
            width: 100%;
        }

        .card {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.5rem 1rem;
            background: rgba(100, 75, 35, 0.08);
            border: 1px solid rgba(100, 70, 30, 0.28);
            border-radius: 5px;
            color: #3d2e1a;
            font-family: 'Special Elite', monospace;
            font-size: 0.82rem;
            line-height: 1.5;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            transition: background-color 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        /* Ink shimmer hover */
        .card::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200%;
            height: 200%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(90, 65, 25, 0.18) 0%, rgba(60, 40, 15, 0.08) 35%, transparent 65%);
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
        }

        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 5px;
            box-shadow: inset 0 0 25px rgba(50, 35, 15, 0.12);
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
        }

        .card:hover {
            background: rgba(85, 60, 25, 0.18);
            border-color: rgba(100, 70, 30, 0.45);
        }

        .card:hover::before,
        .card:hover::after {
            opacity: 1;
        }

        /* ── Responsive ── */
        @media (max-width: 650px) {
            .page {
                margin: 1rem;
                padding: 2rem 1.2rem;
            }

            .inner-border {
                padding: 1.5rem 1rem;
            }

            .oath {
                font-size: 0.9rem;
            }

            .cards {
                flex-direction: column;
            }

            .photo-frame {
                width: 140px;
                height: 140px;
            }

            .profile-name {
                font-size: 1.35rem;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="inner-border">

            <!-- Oath Header -->
            <p class="oath">"I solemnly swear that I am up to no good"</p>

            <!-- Profile -->
            <div class="profile-section">
                <div class="photo-frame">
                    <img src="profil/dobby.jpg" alt="Tuana Anakaygısız" class="profile-photo">
                </div>
                <h1 class="profile-name">Tuana Anakaygısız</h1>
                <p class="profile-subtitle">Veri Analizi ve Python Portfolyosu</p>
            </div>

            <!-- Separator -->
            <div class="separator">✦ — ⚡ — ✦</div>

            <!-- Navigation Cards -->
            <nav class="cards">
                <a href="regression_game.html" class="card">Görev 2: Etkileşimli Uygulama</a>
                <a href="3. hafta/veri_gorsellestirme.png" class="card">Görev 7: Veri Dağılım Grafiği</a>
                <a href="3. hafta/data.csv" class="card">Görev 7: Ham CSV Verisi</a>
            </nav>

        </div>
    </div>
</body>
</html>
